---
applications:
  - name: ada-document-search
    memory: 1G
    instances: 1
    path: target/ada-mcp-document-search-1.0.0-SNAPSHOT.jar
    buildpacks:
      - java_buildpack_offline
    env:
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 21.+ } }'
      SPRING_AI_OPENAI_API_KEY: ((OPENAI-API-KEY))
    services:
      - vector-db
