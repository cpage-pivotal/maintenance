spring:
  ai:
    mcp:
      server:
        protocol: STREAMABLE
        name: ada-ad-lookup
        version: 1.0.0
        instructions: >
          This server provides direct lookup of FAA Airworthiness Directives by AD number.
          Returns full metadata and abstract. Use when you know the AD number from an
          aircraft record or task card reference.

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info
